name: Test basic usage - contract-only mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          goal: "Create a hello world function in Python"
          contract-only: "true"
      - name: Assert result output is present
        env:
          RESULT: ${{ steps.action.outputs.result }}
        run: |
          echo "result: $RESULT"
          if [ -z "$RESULT" ]; then
            echo "WARN: result output is empty (may be expected for contract-only mode)"
          else
            echo "PASS: result output is set"
          fi
