name: Test audit mode with diff-file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a sample diff file
        run: |
          mkdir -p /tmp/swarm-test
          cat > /tmp/swarm-test/sample.diff <<'EOF'
          --- a/foo.py
          +++ b/foo.py
          @@ -1,3 +1,3 @@
          -def test_foo():
          -    assert True
          +def test_foo():
          +    pass
          EOF
      - id: action
        uses: .
        with:
          audit-mode: 'true'
          diff-file: '/tmp/swarm-test/sample.diff'
          audit-comment: 'false'
          working-directory: '${{ github.workspace }}'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped"
            exit 1
          fi
          echo "PASS: action executed"
