name: Test legacy orchestrator mode with goal
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          goal: 'Write a hello world function'
          contract-only: 'true'
          extractor: 'deterministic'
          session: 'deterministic'
          model: 'claude-3-5-sonnet-20241022'
          falsifiers: 'off'
          mode: 'single'
          max-obligations: '5'
          cost-cap: '1000'
          repo-root: '${{ github.workspace }}'
          working-directory: '${{ github.workspace }}'
          result-path: '/tmp/swarm-result-goal.json'
          extra-args: '--snapshot-cleanup always'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped"
            exit 1
          fi
          echo "PASS: action executed"
