name: Test contract-path mode with tournament
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a sample contract directory
        run: |
          mkdir -p /tmp/swarm-contracts/my-contract
          echo '{"obligations": []}' > /tmp/swarm-contracts/my-contract/contract.json
      - id: action
        uses: .
        with:
          contract-path: '/tmp/swarm-contracts/my-contract'
          mode: 'tournament'
          candidates: '2'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped"
            exit 1
          fi
          echo "PASS: action executed"
