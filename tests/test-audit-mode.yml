name: Test audit mode inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          audit-mode: 'true'
          pr: '42'
          emit-aibom: 'cyclonedx-ml'
          audit-comment: 'false'
          result-path: '/tmp/swarm-audit-result.json'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step executed"
