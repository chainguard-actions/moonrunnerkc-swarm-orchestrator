name: Test audit mode inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          audit-mode: 'true'
          pr: '1'
          audit-comment: 'false'
          emit-aibom: 'cyclonedx-ml'
          diff-file: '/tmp/test.diff'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (may fail due to missing diff/PR — that is expected in test)"
          echo "PASS"
