name: Test local provider settings
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          goal: 'Write a hello world function'
          extractor: 'local'
          session: 'local'
          local-backend: 'openai-compatible'
          local-base-url: 'http://localhost:11434/v1'
          local-model-extractor: 'llama3'
          local-model-session: 'llama3'
          local-grammar: 'auto'
          model: 'llama3'
          contract-only: 'true'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped"
            exit 1
          fi
          echo "PASS: action executed"
