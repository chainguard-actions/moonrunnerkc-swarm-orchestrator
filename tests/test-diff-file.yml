name: Test diff-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a sample diff file
        run: |
          cat > /tmp/sample.diff <<'EOF'
          --- a/foo.py
          +++ b/foo.py
          @@ -1,3 +1,3 @@
          -def test_foo():
          -    assert True
          +def test_foo():
          +    pass
          EOF
      - id: action
        uses: .
        with:
          audit-mode: 'true'
          diff-file: '/tmp/sample.diff'
          audit-comment: 'false'
          result-path: '/tmp/swarm-diff-result.json'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step executed"
