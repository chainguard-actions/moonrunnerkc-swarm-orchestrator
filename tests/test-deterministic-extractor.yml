name: Test deterministic extractor with contract-file and contract-module
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create sample contract file and module
        run: |
          cat > /tmp/contract.yaml << 'EOF'
          obligations: []
          EOF
          cat > /tmp/contract-module.js << 'EOF'
          module.exports = { obligations: [] };
          EOF
      - id: action
        uses: .
        with:
          goal: 'Implement a sorting function'
          contract-file: '/tmp/contract.yaml'
          contract-module: '/tmp/contract-module.js'
          extractor: 'deterministic'
          session: 'deterministic'
          contract-only: 'true'
          result-path: '/tmp/swarm-result-det.json'
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped"
            exit 1
          fi
          echo "PASS: action executed"
