name: Test deterministic extractor inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create fixture files for deterministic extractor
        run: |
          mkdir -p /tmp/swarm-det/patches-queue
          mkdir -p /tmp/swarm-det/patches-dir
          cat > /tmp/swarm-det/contract.yaml <<'EOF'
          obligations: []
          EOF
          cat > /tmp/swarm-det/contract-module.js <<'EOF'
          module.exports = { obligations: [] };
          EOF
          echo '{}' > /tmp/swarm-det/patches-queue/queue.jsonl
      - id: action
        uses: .
        with:
          goal: 'Write a hello world function'
          extractor: 'deterministic'
          contract-file: '/tmp/swarm-det/contract.yaml'
          contract-module: '/tmp/swarm-det/contract-module.js'
          external-patches-queue: '/tmp/swarm-det/patches-queue/queue.jsonl'
          external-patches-dir: '/tmp/swarm-det/patches-dir'
        continue-on-error: true
      - name: Assert action ran (deterministic extractor inputs accepted)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "" ]; then
            echo "FAIL: step did not execute"
            exit 1
          fi
          echo "PASS: action accepted deterministic extractor inputs"
