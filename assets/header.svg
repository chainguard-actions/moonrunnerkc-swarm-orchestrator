<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Swarm Orchestrator: contract-first AI coding swarm with hash-chained evidence">
  <title>Swarm Orchestrator</title>
  <defs>
    <style>
      .line { stroke: #64748b; stroke-width: 1; opacity: 0.55; fill: none; }
      .line-fail { stroke: #dc2626; stroke-width: 1.25; opacity: 0.85; fill: none; stroke-dasharray: 3 3; }
      .persona { fill: none; stroke: #64748b; stroke-width: 1.5; }
      .persona-core { fill: #64748b; }
      .persona-fail { fill: none; stroke: #dc2626; stroke-width: 1.75; }
      .persona-fail-core { fill: #dc2626; }
      .contract-outer { fill: none; stroke: #2563eb; stroke-width: 2; }
      .contract-inner { fill: #2563eb; opacity: 0.18; stroke: #2563eb; stroke-width: 1; }
      .chain-link { fill: #2563eb; opacity: 0.18; stroke: #2563eb; stroke-width: 1.25; }
      .chain-line { stroke: #2563eb; stroke-width: 1.25; opacity: 0.7; }
      .title { font: 600 54px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; letter-spacing: -1px; }
      .tagline { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #475569; }
      .meta { font: 500 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #64748b; letter-spacing: 0.5px; }
      .chain-label { font: 500 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #64748b; letter-spacing: 0.4px; }
      @media (prefers-color-scheme: dark) {
        .title { fill: #e2e8f0; }
        .tagline { fill: #94a3b8; }
        .meta { fill: #94a3b8; }
        .chain-label { fill: #94a3b8; }
        .line { stroke: #94a3b8; }
        .persona { stroke: #94a3b8; }
        .persona-core { fill: #94a3b8; }
        .contract-outer { stroke: #60a5fa; }
        .contract-inner { fill: #60a5fa; stroke: #60a5fa; }
        .chain-link { fill: #60a5fa; stroke: #60a5fa; }
        .chain-line { stroke: #60a5fa; }
      }
    </style>
  </defs>

  <!-- Population swarm: 8 personas orbiting a contract artifact, with one
       red dashed candidate representing a streaming-aborted / tournament
       reject. -->
  <g transform="translate(240,150)">
    <line class="line" x1="-180" y1="-100" x2="0" y2="0"/>
    <line class="line" x1="-200" y1="-30"  x2="0" y2="0"/>
    <line class="line" x1="-180" y1="60"   x2="0" y2="0"/>
    <line class="line" x1="-50"  y1="135"  x2="0" y2="0"/>
    <line class="line" x1="60"   y1="125"  x2="0" y2="0"/>
    <line class="line" x1="170"  y1="-10"  x2="0" y2="0"/>
    <line class="line" x1="40"   y1="-130" x2="0" y2="0"/>
    <line class="line" x1="-65"  y1="-125" x2="0" y2="0"/>

    <line class="line-fail" x1="135" y1="90" x2="0" y2="0"/>

    <!-- Contract: hex with three horizontal lines = obligations -->
    <polygon class="contract-inner" points="-34,-30 34,-30 56,0 34,30 -34,30 -56,0"/>
    <polygon class="contract-outer" points="-34,-30 34,-30 56,0 34,30 -34,30 -56,0"/>
    <line class="contract-outer" x1="-24" y1="-12" x2="24" y2="-12" stroke-width="1.25"/>
    <line class="contract-outer" x1="-24" y1="0"   x2="16" y2="0"   stroke-width="1.25"/>
    <line class="contract-outer" x1="-24" y1="12"  x2="24" y2="12"  stroke-width="1.25"/>

    <!-- 8 personas (default population) -->
    <g>
      <circle class="persona" cx="-180" cy="-100" r="6"/>
      <circle class="persona-core" cx="-180" cy="-100" r="2.2"/>
      <circle class="persona" cx="-200" cy="-30" r="6"/>
      <circle class="persona-core" cx="-200" cy="-30" r="2.2"/>
      <circle class="persona" cx="-180" cy="60" r="6"/>
      <circle class="persona-core" cx="-180" cy="60" r="2.2"/>
      <circle class="persona" cx="-50" cy="135" r="6"/>
      <circle class="persona-core" cx="-50" cy="135" r="2.2"/>
      <circle class="persona" cx="60" cy="125" r="6"/>
      <circle class="persona-core" cx="60" cy="125" r="2.2"/>
      <circle class="persona" cx="170" cy="-10" r="6"/>
      <circle class="persona-core" cx="170" cy="-10" r="2.2"/>
      <circle class="persona" cx="40" cy="-130" r="6"/>
      <circle class="persona-core" cx="40" cy="-130" r="2.2"/>
      <circle class="persona" cx="-65" cy="-125" r="6"/>
      <circle class="persona-core" cx="-65" cy="-125" r="2.2"/>
    </g>

    <!-- 1 rejected candidate / streaming abort -->
    <g>
      <circle class="persona-fail" cx="135" cy="90" r="7"/>
      <circle class="persona-fail-core" cx="135" cy="90" r="2.6"/>
    </g>
  </g>

  <!-- Title block -->
  <g transform="translate(520,0)">
    <text class="title" x="0" y="138">Swarm Orchestrator</text>
    <text class="tagline" x="2" y="178">Contract-first AI coding swarm with hash-chained evidence.</text>
    <text class="meta" x="2" y="212">8 PERSONAS  ·  TOURNAMENT SYNTHESIS  ·  STREAMING VERIFIER</text>

    <!-- Hash-chained ledger glyph: 6 linked entries representing
         append-only JSONL with hash references. -->
    <text class="chain-label" x="2" y="252">LEDGER.JSONL</text>
    <g transform="translate(2,262)">
      <rect class="chain-link" x="0"   y="0" width="44" height="16" rx="2"/>
      <line class="chain-line" x1="44"  y1="8" x2="56" y2="8"/>
      <rect class="chain-link" x="56"  y="0" width="44" height="16" rx="2"/>
      <line class="chain-line" x1="100" y1="8" x2="112" y2="8"/>
      <rect class="chain-link" x="112" y="0" width="44" height="16" rx="2"/>
      <line class="chain-line" x1="156" y1="8" x2="168" y2="8"/>
      <rect class="chain-link" x="168" y="0" width="44" height="16" rx="2"/>
      <line class="chain-line" x1="212" y1="8" x2="224" y2="8"/>
      <rect class="chain-link" x="224" y="0" width="44" height="16" rx="2"/>
      <line class="chain-line" x1="268" y1="8" x2="280" y2="8"/>
      <rect class="chain-link" x="280" y="0" width="44" height="16" rx="2"/>
    </g>
  </g>
</svg>
