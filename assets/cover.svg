<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Swarm Orchestrator: advisory PR audit and contract gate for AI-generated code">
  <title>Swarm Orchestrator</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="#0b1628"/>
  <!-- Grid -->
  <path d="M0 64H1280M0 128H1280M0 192H1280M0 256H1280M128 0V320M256 0V320M384 0V320M512 0V320M640 0V320M768 0V320M896 0V320M1024 0V320M1152 0V320" stroke="#162438" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#22d3ee"/>

  <!-- Title -->
  <text x="72" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-2">Swarm Orchestrator</text>
  <!-- Tagline -->
  <text x="74" y="175" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="21" font-weight="400" fill="#94a3b8">Advisory PR audit and contract gate for AI-generated code.</text>

  <!-- Stat chips -->
  <rect x="74" y="216" width="220" height="34" rx="6" fill="#0e2236" stroke="#1e3d5c"/>
  <text x="84" y="238" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="600" fill="#22d3ee">84% oracle recall  (253 / 300)</text>

  <rect x="304" y="216" width="190" height="34" rx="6" fill="#0e2236" stroke="#1e3d5c"/>
  <text x="314" y="238" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="600" fill="#22d3ee">0.11 false alarms / PR</text>

  <rect x="504" y="216" width="138" height="34" rx="6" fill="#0e2236" stroke="#1e3d5c"/>
  <text x="514" y="238" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="600" fill="#22d3ee">11 detectors</text>

  <!-- Vertical separator -->
  <line x1="730" y1="36" x2="730" y2="284" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Right: audit flow -->

  <!-- PR diff input box -->
  <rect x="762" y="88" width="118" height="68" rx="7" fill="#0e1e30" stroke="#1e3d5c" stroke-width="1.2"/>
  <text x="821" y="111" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">PR diff</text>
  <text x="776" y="129" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#34d399">+ add handler()</text>
  <text x="776" y="145" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#f87171">- catch {}</text>

  <!-- Arrow to detector -->
  <line x1="882" y1="122" x2="924" y2="122" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Detector hexagon (center 960, 122) -->
  <polygon points="960,92 988,107 988,137 960,152 932,137 932,107" fill="#0e1e30" stroke="#22d3ee" stroke-width="1.4"/>
  <text x="960" y="118" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#22d3ee" text-anchor="middle">11</text>
  <text x="960" y="135" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="9" fill="#64748b" text-anchor="middle">detectors</text>

  <!-- Arrow to advisory -->
  <path d="M988 107 L1034 82" stroke="#34d399" stroke-width="1.5" fill="none"/>
  <!-- Arrow to gate block -->
  <path d="M988 137 L1034 162" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>

  <!-- Advisory result -->
  <rect x="1034" y="60" width="180" height="44" rx="7" fill="#0a2018" stroke="#34d399" stroke-width="1.2"/>
  <text x="1124" y="79" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">advisory finding</text>
  <text x="1124" y="96" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#64748b" text-anchor="middle">exit 0 · PR comment</text>

  <!-- Gate block result -->
  <rect x="1034" y="144" width="180" height="44" rx="7" fill="#200a0d" stroke="#f87171" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="1124" y="163" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#f87171" text-anchor="middle">gate block</text>
  <text x="1124" y="180" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#64748b" text-anchor="middle">exit 1 · runtime proof</text>
</svg>
